<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bali 2026 · Two routes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16241C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bali26">
<style>
  :root{--paper:#FBFCF7;--paper2:#EEF6EA;--tint-turq:#E3F5F4;--tint-sun:#FBF1D6;--ink:#16241C;--ink-soft:#566457;--jungle:#1E7A4D;--turq:#0DA7A7;--sun:#EBA90B;--coral:#FF6A4D;--line:rgba(22,36,28,0.12);--line-strong:rgba(22,36,28,0.22);--card:#FFFFFF}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;overflow-y:scroll;overflow-x:hidden}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-wrap:break-word}
  a{color:inherit} ::selection{background:var(--sun);color:var(--ink)}
  .wrap{max-width:980px;margin:0 auto;padding:0 22px}
  .langbar{position:sticky;top:0;z-index:60;background:var(--ink);display:flex}
  .langbar button{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:13px 10px;background:transparent;border:none;color:#AEBDB1;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:0.06em;cursor:pointer;border-bottom:4px solid transparent}
  .langbar button .flag{font-size:22px} .langbar button:hover{color:#fff}
  .langbar button.active{color:#fff;background:rgba(255,255,255,0.07);border-bottom-color:var(--sun)}
  .lang-block[hidden]{display:none}
  header.hero{position:relative;min-height:50vh;display:flex;align-items:flex-end;color:#fff;overflow:hidden}
  header.hero .bg{position:absolute;inset:0;background:linear-gradient(135deg,var(--jungle),var(--turq) 60%,var(--sun))}
  header.hero .bg img{width:100%;height:100%;object-fit:cover;display:block}
  header.hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,59,46,0.30),rgba(13,59,46,0.78))}
  header.hero .wrap{position:relative;z-index:2;padding-top:36px;padding-bottom:32px;width:100%}
  .eyebrow{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:#FCE9A8}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(48px,13vw,108px);line-height:0.9;letter-spacing:-0.02em;margin:8px 0 4px;color:#fff;text-shadow:0 2px 30px rgba(0,0,0,0.25)}
  h1 .dot{color:var(--sun)}
  header.hero .sub{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(17px,4.4vw,26px);max-width:32ch;text-shadow:0 1px 12px rgba(0,0,0,0.3)}
  section{padding:46px 0}
  section.bg2{background:var(--paper2)} section.bgT{background:var(--tint-turq)} section.bgS{background:var(--tint-sun)}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .sec-head .no{font-family:'Space Mono',monospace;color:var(--coral);font-size:14px;font-weight:700}
  .sec-head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(28px,7vw,46px);line-height:1;letter-spacing:-0.01em}
  .intro{color:var(--ink-soft);max-width:62ch;margin:6px 0 22px}
  .cmp{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.cmp{grid-template-columns:1fr}}
  .col{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}
  .col .photo{aspect-ratio:16/9;position:relative;background:linear-gradient(135deg,var(--jungle),var(--turq) 60%,var(--sun))}
  .col .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .ribbon-tag{position:absolute;top:10px;left:10px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;color:#fff}
  .ribbon-tag.r1{background:var(--jungle)} .ribbon-tag.r2{background:var(--coral)}
  .banner{background:var(--coral);color:#fff;font-size:13px;padding:10px 14px;font-weight:600;line-height:1.45}
  .note-box{background:var(--tint-sun);border:1px solid rgba(235,169,11,0.45);border-radius:14px;padding:14px 16px;margin:0 0 16px;font-size:14px}
  .note-box b{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--coral);display:block;margin-bottom:4px}
  .colbody{padding:18px;flex:1}
  .colbody h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px}
  .colbody .tag{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);margin:3px 0 8px}
  .colbody .route-line{font-size:13px;color:var(--ink-soft);margin-bottom:6px}
  .pc-h{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;margin:14px 0 6px}
  .pc-h.pro{color:var(--jungle)} .pc-h.con{color:var(--coral)}
  ul.pc{list-style:none} ul.pc li{position:relative;padding-left:20px;margin-bottom:5px;font-size:14px}
  ul.pc.pro li::before{content:"+";position:absolute;left:2px;color:var(--jungle);font-weight:700}
  ul.pc.con li::before{content:"–";position:absolute;left:2px;color:var(--coral);font-weight:700}
  .best{margin-top:12px;font-size:13px;background:var(--paper2);border-radius:10px;padding:9px 12px}
  .best b{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--jungle)}
  .col.r2col .best{background:var(--tint-sun)} .col.r2col .best b{color:var(--coral)}
  .routebar{display:flex;gap:10px;margin:0 0 20px;flex-wrap:wrap}
  .rbtn{flex:1 1 200px;padding:14px 16px;border-radius:14px;border:2px solid var(--line-strong);background:var(--card);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;cursor:pointer;color:var(--ink-soft);text-align:left;line-height:1.2}
  .rbtn small{display:block;font-family:'Space Mono',monospace;font-size:11px;font-weight:400;margin-top:3px;opacity:0.8}
  .rbtn.r1.active{border-color:var(--jungle);background:var(--jungle);color:#fff}
  .rbtn.r2.active{border-color:var(--coral);background:var(--coral);color:#fff}
  .routebox{display:none} .routebox.show{display:block}
  .maplink{display:inline-flex;align-items:center;gap:8px;background:var(--turq);color:#fff;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;text-decoration:none;padding:11px 16px;border-radius:12px;margin-bottom:18px}
  .via{display:flex;gap:12px;align-items:flex-start;padding:11px 14px;margin-bottom:11px;background:var(--card);border:1px solid var(--line);border-radius:13px}
  .via .t{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--coral);white-space:nowrap;flex:0 0 auto;padding-top:2px}
  .via .v h4{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;line-height:1.25}
  .via .v p{font-size:13px;color:var(--ink-soft);margin-top:1px}
  .via.pic .vthumb{width:92px;height:92px;object-fit:cover;border-radius:10px;flex:0 0 auto;background:linear-gradient(135deg,var(--jungle),var(--turq))}
  .hop{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--coral);margin:0 0 7px 2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:11px}
  .card.opt{border:2px dashed rgba(13,167,167,0.5)}
  .photo{position:relative;aspect-ratio:16/8;background:linear-gradient(135deg,var(--jungle),var(--turq) 60%,var(--sun))}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .cap{position:absolute;left:0;bottom:0;font-family:'Space Mono',monospace;font-size:10px;color:#fff;background:rgba(22,36,28,0.55);padding:3px 8px;border-radius:0 8px 0 0}
  .gallery{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .gallery::-webkit-scrollbar{display:none}
  .gallery figure{position:relative;flex:0 0 100%;scroll-snap-align:start;margin:0;aspect-ratio:16/9;background:linear-gradient(135deg,var(--jungle),var(--turq) 60%,var(--sun))}
  .gallery figure img{width:100%;height:100%;object-fit:cover;display:block}
  .gallery figcaption{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(22,36,28,0.78));color:#fff;font-family:'Space Mono',monospace;font-size:12px;padding:26px 12px 9px}
  .galhint{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);text-align:center;padding:7px 0 0;background:var(--card)}
  .col .gallery figure{aspect-ratio:16/9}
</style>
</head>
<body>
<div class="langbar">
  <button id="btn-en" class="active" onclick="setLang('en')"><span class="flag">🇬🇧</span> English</button>
  <button id="btn-de" onclick="setLang('de')"><span class="flag">🇩🇪</span> Deutsch</button>
</div>

<div id="en" class="lang-block">
<header class="hero">
  <div class="bg"><img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Pura_Ulun_Danu_Bratan,_2022.jpg" alt="Bali lake temple"></div>
  <div class="scrim"></div>
  <div class="wrap"><div class="eyebrow">21 Aug – 5 Sep 2026 · Bali</div><h1>Bali<span class="dot">.</span></h1><div class="sub">After the camp: two ways to spend the five nights. Pick one as a group.</div></div>
</header>
<section><div class="wrap">
  <div class="sec-head"><span class="no">01</span><h2>Compare the two routes</h2></div>
  <p class="intro">One week of surf camp in Canggu is fixed. The choice is the second week.</p>
  <div class="cmp">
    <div class="col r1col">
      <div class="gallery">
        <figure><span class="ribbon-tag r1">Route 1</span><img src="https://upload.wikimedia.org/wikipedia/commons/1/14/Mt._Agung_meets_the_sea_2.jpg" alt="Mount Agung rising over the east Bali coast"><figcaption>Mount Agung, east Bali</figcaption></figure>
        <figure><img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Bali,_Rice_fields,_Rice_terraces_in_East_Bali,_Indonesia.jpg" alt="East Bali rice terraces"><figcaption>East Bali rice terraces</figcaption></figure>
      </div>
    </div>
    <div class="col r2col">
      <div class="photo"><img src="https://upload.wikimedia.org/wikipedia/commons/b/bf/Kelingking_Beach,_Nusa_Penida.jpg" alt="Kelingking Beach, Nusa Penida"></div>
    </div>
  </div>
</div></section>
<section class="bg2"><div class="wrap">
  <div class="routebox r1 show">
    <div class="via pic"><img class="vthumb" src="https://upload.wikimedia.org/wikipedia/commons/8/88/Jatiluwih_rice_terraces.jpg" alt="Jatiluwih rice terraces"></div>
    <div class="via pic"><img class="vthumb" src="https://upload.wikimedia.org/wikipedia/commons/7/77/Pura_Ulun_Danu_Bratan,_2022.jpg" alt="Pura Ulun Danu Bratan"></div>
    <div class="card"><div class="gallery">
      <figure><img src="https://upload.wikimedia.org/wikipedia/commons/6/67/Munduk_air_terjun_2009.jpg" alt="Munduk waterfall"></figure>
      <figure><img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Banyumala_Waterfall.jpg" alt="Banyumala twin waterfall"></figure>
      <figure><img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Pura_Ulun_Danu_Bratan,_2022.jpg" alt="Ulun Danu Bratan"></figure>
    </div></div>
    <div class="via pic"><img class="vthumb" src="https://upload.wikimedia.org/wikipedia/commons/7/72/Gunung_Batur_from_Kintamani.jpg" alt="Mount Batur caldera from Kintamani"></div>
    <div class="card"><div class="gallery">
      <figure><img src="https://upload.wikimedia.org/wikipedia/commons/c/c2/RICE_TERRACE_OF_SIDEMEN_EAST_BALI.jpg" alt="Sidemen rice terraces"></figure>
      <figure><img src="https://upload.wikimedia.org/wikipedia/commons/8/85/Tirta_Gangga_water_palace,_Bali,_Indonesia.JPG" alt="Tirta Gangga water palace"></figure>
      <figure><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Bali_Pura_Lempuyang_Luhur.jpg" alt="Pura Lempuyang"></figure>
    </div></div>
    <div class="card opt"><div class="photo"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2d/Amed_beach.jpg" alt="Amed beach with Mount Agung"></div></div>
    <div class="card"><div class="photo"><img src="https://upload.wikimedia.org/wikipedia/commons/0/07/Pantai_Melasti,_Bali.jpg" alt="Pantai Melasti"></div></div>
  </div>
</div></section>
</div>
</body>
</html>
